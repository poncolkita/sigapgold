<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#D4AF37">
  <meta http-equiv="Content-Security-Policy" content="default-src * self blob: data: gap:; style-src * self 'unsafe-inline' blob: data:; script-src * self 'unsafe-inline' blob: data: 'unsafe-eval'; object-src * self blob: data:; img-src * self 'unsafe-inline' blob: data: https: http:; connect-src self * blob: data:; frame-src * self blob: data:;">
  
  <!-- CSS External -->
  <link rel="stylesheet" href="style.css">
  
  <!-- Vendor CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Vendor JS -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  
  <title>SIGAP - Sistem Geolokasi Absensi</title>
</head>
<body>

  <!-- Global Loading Overlay -->
  <div class="loading-overlay" id="globalLoading">
    <div class="loading-content">
      <div class="loading-spinner"></div>
      <p style="color: var(--gold);">Memproses...</p>
    </div>
  </div>

  <!-- LOGIN PAGE -->
  <section id="loginPage">
    <div class="login-box">
      <div class="logo-container">
        <img src="https://res.cloudinary.com/maswardi/image/upload/v1769768658/afiks_gwju4y.png" alt="Logo" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
        <div class="logo-fallback">S</div>
      </div>
      <h3>SIGAP</h3>
      <p class="subtitle">Sistem Geolokasi Absensi</p>
      <input type="text" id="username" class="login-input" placeholder="Username" value="admin">
      <input type="password" id="password" class="login-input" placeholder="Password" value="admin123">
      <button class="btn-gold" onclick="doLogin()"><i class="fas fa-sign-in-alt me-2"></i>MASUK</button>
      <p class="version-text">v1.0 • Simple Version</p>
    </div>
  </section>

  <!-- MAIN APP (will be shown after login) -->
  <main id="mainApp" style="display:none;">
    <!-- Mobile Navigation -->
    <div class="mobile-nav" style="display:none;">
      <h5 style="margin:0; color:white;"><i class="fas fa-crown me-2" style="color: var(--gold);"></i>SIGAP</h5>
      <button class="btn btn-link p-0" onclick="toggleSidebar()"><i class="fas fa-bars fa-lg" style="color: var(--gold);"></i></button>
    </div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <img id="userFoto" src="https://via.placeholder.com/100" class="user-pic" alt="User">
        <h5 id="userNama">Nama User</h5>
        <span id="userJabatan" class="badge-jabatan">Jabatan</span>
        <div id="statusAbsenBadge" class="mt-2"></div>
        <div id="jarakInfo" class="mt-2 small" style="color: var(--gold);"></div>
      </div>
      <nav class="mt-3 flex-grow-1">
        <div class="nav-link-custom active" onclick="loadPage('dashboard')"><i class="fas fa-home"></i> Dashboard</div>
        <div class="nav-link-custom" onclick="loadPage('presensi')"><i class="fas fa-camera"></i> Presensi</div>
        <div class="nav-link-custom" onclick="loadPage('about')"><i class="fas fa-info-circle"></i> Tentang</div>
      </nav>
      <div class="p-3">
        <button class="btn-outline-lux w-100" onclick="confirmLogout()"><i class="fas fa-sign-out-alt me-2"></i> Keluar</button>
      </div>
    </aside>

    <!-- Main Content Area -->
    <div class="main-content" id="contentArea"></div>
  </main>

  <!-- JavaScript External -->
  <script src="script.js"></script>
</body>
</html>
